services:
  desafio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desafio-empleados
    ports:
      - "8040:8040"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:desafiodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - SPRING_H2_CONSOLE_ENABLED=true
      - SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8040/h2-console"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s