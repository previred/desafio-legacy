<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Empleados App</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container">

    <h4>Gestión de Empleados</h4>

    <!-- FORM -->
<div class="card">

    <h4>Agregar Empleado</h4>

    <div class="form-grid">

    <div class="form-group">
        <label for="nombre">Nombre <span class="required">*</span></label>
        <input type="text" id="nombre">
        <div class="error" id="errNombre"></div>
    </div>

    <div class="form-group">
        <label for="apellido">Apellido <span class="required">*</span></label>
        <input type="text" id="apellido">
        <div class="error" id="errApellido"></div>
    </div>

    <div class="form-group">
        <label for="dni">DNI <span class="required">*</span></label>
        <input type="text" id="dni">
        <div class="error" id="errDni"></div>
    </div>

    <div class="form-group">
        <label for="cargo">Cargo <span class="required">*</span></label>
        <input type="text" id="cargo">
        <div class="error" id="errCargo"></div>
    </div>

    <div class="form-group">
        <label for="salario">Salario <span class="required">*</span></label>
        <input type="text" id="salario">
        <div class="error" id="errSalario"></div>
    </div>

    <div class="form-group">
        <label for="bono">Bono (opcional)</label>
        <input type="text" id="bono">
        <div class="error" id="errBono"></div>
    </div>

    <div class="form-group">
        <label for="descuentos">Descuentos (opcional)</label>
        <input type="text" id="descuentos">
        <div class="error" id="errDescuentos"></div>
    </div>

</div>

    <button id="btnAdd" style="margin-top:15px;">Agregar</button>
     <br>
     <br>
    <div id="msg"></div>

</div>

    <!-- LIST -->
   <div class="card">
    <h3>Lista de Empleados</h3>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>DNI</th>
                    <th>Cargo</th>
                    <th>Salario Base</th>
                    <th>Bono</th>
                    <th>Descuentos</th>
                    <th>Salario Neto</th>
                    <th>Acción</th>
                </tr>
            </thead>

            <tbody id="tablaEmpleados"></tbody>
        </table>
    </div>
</div>

</div>

<script src="js/api/empleados.api.js"></script>
<script src="js/validators/empleado.validator.js"></script>
<script src="js/utils/format.js"></script>
<script src="js/modules/empleados.list.js"></script>
<script src="js/modules/empleados.create.js"></script>
<script src="js/modules/empleados.delete.js"></script>
<script src="js/app.js"></script>

</body>
</html>
