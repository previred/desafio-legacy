# ============================================================
# Perfil PROD — se activa con: --spring.profiles.active=prod
# Todas las propiedades sensibles deben sobreescribirse via
# variables de entorno o un gestor de secretos (Vault, etc.)
# ============================================================

# --- Datasource ----------------------------------------------------------
# Sobreescribir con el motor real (PostgreSQL, MySQL, etc.).
# Nunca dejar H2 en producción: no es apto para cargas concurrentes.
# Ejemplo PostgreSQL:
#   spring.datasource.url=jdbc:postgresql://db-host:5432/empleados
#   spring.datasource.driver-class-name=org.postgresql.Driver
#   spring.datasource.username=${DB_USER}
#   spring.datasource.password=${DB_PASSWORD}
#
# HikariCP — pool de conexiones recomendado con Spring Boot 2.x
#   spring.datasource.hikari.maximum-pool-size=10
#   spring.datasource.hikari.connection-timeout=20000
#   spring.datasource.hikari.idle-timeout=300000

# --- Schema init ---------------------------------------------------------
# En prod se desactiva la inicialización automática del esquema;
# las migraciones se gestionan con Flyway o Liquibase.
spring.sql.init.mode=never

# --- Consola H2 ----------------------------------------------------------
# Siempre deshabilitada en producción.
spring.h2.console.enabled=false

# --- Servidor ------------------------------------------------------------
server.max-http-header-size=16384
server.tomcat.max-http-form-post-size=1048576

# --- Logging -------------------------------------------------------------
logging.level.com.desafio.empleados=INFO
# En prod se recomienda salida en JSON estructurado para ingestar en ELK/CloudWatch:
#   logging.pattern.console={"ts":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}","level":"%p","requestId":"%X{requestId:-}","logger":"%logger","msg":"%m"}%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p ${PID:- } [%15.15t] [%X{requestId:-}] %40.40logger{39} : %m%n%wEx
