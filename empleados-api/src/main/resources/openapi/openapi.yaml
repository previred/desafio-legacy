openapi: 3.0.3
info:
  title: Empleados API (Servlet)
  description: |
    API del desafío técnico Servlets + JDBC (H2) + AJAX.
    Identificador de correlación: cabecera **X-Request-Id** (opcional en petición; siempre presente en respuesta).
    Tamaño orientativo del POST: **1 MiB** (`server.tomcat.max-http-form-post-size`).
    Cabeceras de seguridad básicas en rutas distintas de `/h2-console` (ver filtro en código).
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Desarrollo local
paths:
  /api/empleados:
    get:
      summary: Listar empleados
      operationId: listarEmpleados
      parameters:
        - $ref: '#/components/parameters/XRequestId'
      responses:
        '200':
          description: Lista (puede ser vacía)
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmpleadoRespuesta'
        '404':
          description: GET con subruta inválida (ej. /api/empleados/extra)
        '405':
          description: Método no soportado (p. ej. PUT o PATCH)
          headers:
            Allow:
              schema:
                type: string
                example: GET, POST, DELETE, HEAD, OPTIONS
        '500':
          description: Error de persistencia
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorServidor'
    post:
      summary: Crear empleado
      operationId: crearEmpleado
      parameters:
        - $ref: '#/components/parameters/XRequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoAlta'
      responses:
        '201':
          description: Creado
          headers:
            Location:
              description: URL del recurso creado (incluye id)
              schema:
                type: string
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoRespuesta'
        '400':
          description: Validación de negocio o JSON no parseable
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroresValidacion'
        '415':
          description: Content-Type distinto de application/json
        '405':
          description: PUT/PATCH no permitidos
          headers:
            Allow:
              schema:
                type: string
        '500':
          description: Error de persistencia
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorServidor'
  /api/empleados/{id}:
    delete:
      summary: Eliminar empleado por id
      operationId: eliminarEmpleado
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Eliminado
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
        '400':
          description: Id de ruta inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mensaje'
        '404':
          description: Empleado inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mensaje'
        '500':
          description: Error de persistencia
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorServidor'
components:
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Correlación cliente; si se omite, el servidor genera uno.
  headers:
    XRequestId:
      description: Identificador de correlación de la petición
      schema:
        type: string
  schemas:
    EmpleadoAlta:
      type: object
      required:
        - nombre
        - apellido
        - rutDni
        - cargo
        - salarioBase
      properties:
        nombre:
          type: string
        apellido:
          type: string
        rutDni:
          type: string
          description: RUT chileno (validación de DV en servidor)
        cargo:
          type: string
        salarioBase:
          type: number
          description: Monto entero en pesos; mínimo 400000
        bono:
          type: number
          default: 0
        descuentos:
          type: number
          default: 0
    EmpleadoRespuesta:
      description: Empleado tal como se expone en GET/POST (DTO de salida)
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string
        apellido:
          type: string
        rutDni:
          type: string
        cargo:
          type: string
        salarioBase:
          type: number
        bono:
          type: number
        descuentos:
          type: number
    ErrorRegistro:
      type: object
      properties:
        campo:
          type: string
        mensaje:
          type: string
    ErroresValidacion:
      type: object
      properties:
        errores:
          type: array
          items:
            $ref: '#/components/schemas/ErrorRegistro'
    Mensaje:
      type: object
      properties:
        mensaje:
          type: string
    ErrorServidor:
      type: object
      properties:
        mensaje:
          type: string
          example: Error interno del servidor.
