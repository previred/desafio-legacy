spring.application.name=empleados-api
server.port=8080

# Límites Tomcat (P1): cabeceras y tamaño razonable del cuerpo POST (incl. JSON)
server.max-http-header-size=16384
server.tomcat.max-http-form-post-size=1048576

# Perfil por defecto: desarrollo local (H2 + consola). Producción: --spring.profiles.active=prod

spring.datasource.url=jdbc:h2:mem:empleadosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.com.desafio.empleados=INFO

# Correlación: RequestCorrelationFilter escribe MDC "requestId" y cabecera X-Request-Id
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p ${PID:- } [%15.15t] [%X{requestId:-}] %40.40logger{39} : %m%n%wEx
