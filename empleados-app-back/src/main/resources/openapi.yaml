openapi: 3.0.1

info:
  title: Desafío Legacy - API Empleados
  version: 1.0.0
  description: API de gestión de empleados basada en Servlets (legacy)

servers:
  - url: http://localhost:8080

tags:
  - name: Empleados
    description: Operaciones de empleados

paths:

  /api/empleados:

    # =========================
    # GET
    # =========================
    get:
      tags:
        - Empleados
      summary: Obtener todos los empleados
      responses:
        "200":
          description: Lista de empleados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmpleadoResponse"

    # =========================
    # POST
    # =========================
    post:
      tags:
        - Empleados
      summary: Crear un empleado
      description: Crea un nuevo empleado en el sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmpleadoRequest"
      responses:
        "201":
          description: Empleado creado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Error de validación

    # =========================
    # DELETE
    # =========================
    delete:
      tags:
        - Empleados
      summary: Eliminar empleado por ID
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Empleado eliminado correctamente
        "404":
          description: Empleado no encontrado

# =========================
# COMPONENTS / DTOs
# =========================
components:
  schemas:

    # -------------------------
    # REQUEST
    # -------------------------
    EmpleadoRequest:
      type: object
      required:
        - nombre
        - apellido
        - dni
        - cargo
        - salario
      properties:
        nombre:
          type: string
          example: Juan
        apellido:
          type: string
          example: Pérez
        dni:
          type: string
          example: 12345678-9
        cargo:
          type: string
          example: Desarrollador
        salario:
          type: number
          format: double
          example: 2000.0
        bono:
          type: number
          format: double
          example: 200.0
        descuentos:
          type: number
          format: double
          example: 100.0

    # -------------------------
    # RESPONSE
    # -------------------------
    EmpleadoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nombre:
          type: string
          example: Juan
        apellido:
          type: string
          example: Pérez
        dni:
          type: string
          example: 12345678-9
        cargo:
          type: string
          example: Desarrollador
        salarioBase:
          type: number
          format: double
          example: 2000.0
        bono:
          type: number
          format: double
          example: 200.0
        descuentos:
          type: number
          format: double
          example: 100.0
        salarioNeto:
          type: number
          format: double
          example: 2100.0

    # -------------------------
    # MESSAGE RESPONSE
    # -------------------------
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Empleado creado correctamente