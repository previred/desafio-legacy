spring.application.name=desafio

# Servidor
server.port=8040

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:desafiodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=RUNSCRIPT FROM 'classpath:schema.sql'
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (˙til para ver los datos mientras desarrollas)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Inicializaciˇn SQL
spring.sql.init.mode=always

# JSON con fechas legibles
spring.jackson.serialization.write-dates-as-timestamps=false

# Logs
logging.level.org.springframework=INFO
logging.level.com.danielr.desafio=DEBUG