# Habilitar consola H2 para pruebas (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de la base de datos (debe coincidir con DatabaseConfig)
spring.datasource.url=jdbc:h2:mem:previred_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=