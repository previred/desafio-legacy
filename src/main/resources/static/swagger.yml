openapi: 3.0.0
info:
  title: API de Gestión de Empleados - Desafío Previred
  description: |
    Documentación técnica para el sistema de gestión de empleados. 
    Incluye validaciones de negocio según los requerimientos del desafío técnico.
  version: 1.0.0
  contact:
    name: Franco Carrasco
servers:
  - url: http://localhost:8080/api
    description: Servidor Local

paths:
  /empleados:
    get:
      summary: Listar todos los empleados
      description: Retorna un array con todos los registros de la base de datos H2.
      responses:
        '200':
          description: Lista de empleados obtenida con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Empleado'
        '500':
          description: Error interno del servidor.

    post:
      summary: Registrar un nuevo empleado
      description: |
        Crea un registro aplicando las siguientes reglas de negocio:
        - Salario mínimo: $400,000.
        - Bonos: Máximo 50% del salario base.
        - Descuentos: No pueden superar el salario base.
        - RUT: Debe ser único.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoInput'
      responses:
        '201':
          description: Empleado creado exitosamente.
        '400':
          description: Error de validación de negocio.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor.

    delete:
      summary: Eliminar un empleado
      parameters:
        - name: id
          in: query
          description: ID único del empleado a eliminar
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Empleado eliminado correctamente.
        '400':
          description: ID no proporcionado o inválido.

components:
  schemas:
    Empleado:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string
        apellido:
          type: string
        rut:
          type: string
        cargo:
          type: string
        salario:
          type: number
        bonos:
          type: number
        descuentos:
          type: number

    EmpleadoInput:
      type: object
      required:
        - nombre
        - apellido
        - rut
        - cargo
        - salario
      properties:
        nombre:
          type: string
          example: "Franco"
        apellido:
          type: string
          example: "Carrasco"
        rut:
          type: string
          example: "12345678-9"
        cargo:
          type: string
          example: "Programador Java"
        salario:
          type: number
          example: 850000
        bonos:
          type: number
          example: 100000
        descuentos:
          type: number
          example: 50000

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: "error"
        mensaje:
          type: string
          example: "El salario base no puede ser menor a $400.000."