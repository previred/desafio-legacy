openapi: "3.0.1"
info:
  title: "Desafío Técnico Previred — API de Empleados"
  description: >
    Módulo liquidador de sueldos construido con Java Servlets nativos y JDBC sobre H2.
    Implementa validaciones de negocio legales (salario mínimo, topes de bonificación,
    control de deducciones y unicidad de RUT).
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Servidor de desarrollo local

paths:
  /api/empleados:
    get:
      summary: Listar empleados
      description: Retorna la lista completa de empleados registrados en el sistema.
      operationId: listarEmpleados
      responses:
        "200":
          description: Lista obtenida correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmpleadoResponse"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Registrar empleado
      description: >
        Crea un nuevo registro de empleado. Aplica las siguientes validaciones:
        (1) Campos obligatorios: nombre, apellido, rut y cargo no pueden estar vacíos.
        (2) Salario base mínimo $400.000.
        (3) Bonos no pueden superar el 50% del salario base.
        (4) Descuentos no pueden superar el salario base.
        (5) Bonos y descuentos no pueden ser negativos.
        (6) RUT único en el sistema (no se permiten duplicados).
        (7) Límites de caracteres aplicados: nombre (100), apellido (100), rut (20), cargo (50).
        (8) Límite numérico máximo para salarios y bonos: 9999999999999.99
        Si alguna regla se incumple, retorna HTTP 400 con detalle del error.
      operationId: registrarEmpleado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmpleadoRequest"
      responses:
        "201":
          description: Empleado registrado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensajeResponse"
              example:
                mensaje: "Registro de empleado guardado"
        "400":
          description: >
            Error de validación. Posibles causas:
            campos obligatorios vacíos, salario base inferior a $400.000,
            bonos superiores al 50% del salario, descuentos mayores al salario,
            RUT duplicado, o formato de datos inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                camposObligatorios:
                  summary: Campos obligatorios vacíos
                  value:
                    error: "Validación de Negocio"
                    mensaje: "Los siguientes campos son obligatorios: nombre, apellido"
                salarioMinimo:
                  summary: Salario base inferior al mínimo
                  value:
                    error: "Validación de Negocio"
                    mensaje: "El sueldo base no puede ser inferior a 400.000"
                bonoExcedido:
                  summary: Bonos superan el 50%
                  value:
                    error: "Validación de Negocio"
                    mensaje: "Los bonos no pueden superar el 50% del salario base"
                descuentoExcedido:
                  summary: Descuentos superan salario
                  value:
                    error: "Validación de Negocio"
                    mensaje: "El total de descuentos no puede ser mayor al salario base"
                rutDuplicado:
                  summary: RUT ya registrado
                  value:
                    error: "Validación de Negocio"
                    mensaje: "El RUT ingresado ya se encuentra registrado en el sistema"
                formatoInvalido:
                  summary: JSON malformado o tipos incorrectos
                  value:
                    error: "Formato Inválido"
                    mensaje: "La estructura de los datos enviados no es válida o contiene tipos incorrectos (Ej: Texto en campos numéricos)"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Error Interno del Servidor"
                mensaje: "Ocurrió un error inesperado al procesar la solicitud."

    delete:
      summary: Eliminar empleado
      description: >
        Elimina un empleado del sistema por su ID.
        Retorna HTTP 400 si el parámetro 'id' no está presente o no es numérico.
        Retorna HTTP 404 si no existe un empleado con ese ID.
      operationId: eliminarEmpleado
      parameters:
        - name: id
          in: query
          required: true
          description: Identificador único del empleado a eliminar
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        "200":
          description: Empleado eliminado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensajeResponse"
              example:
                mensaje: "Registro de empleado eliminado"
        "400":
          description: >
            Parámetro inválido o ausente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                parametroAusente:
                  summary: ID no proporcionado
                  value:
                    error: "Validación de Negocio"
                    mensaje: "El parámetro 'id' es requerido para la eliminación"
                formatoInvalido:
                  summary: ID no numérico
                  value:
                    error: "Validación de Negocio"
                    mensaje: "El parámetro 'id' debe ser un número válido"
        "404":
          description: No se encontró un empleado con el ID proporcionado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Recurso No Encontrado"
                mensaje: "No se encontró un empleado con ID 99"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Error Interno del Servidor"
                mensaje: "Ocurrió un error inesperado al procesar la solicitud."

components:
  schemas:
    EmpleadoRequest:
      type: object
      required:
        - nombre
        - apellido
        - rut
        - cargo
        - salarioBase
      properties:
        nombre:
          type: string
          maxLength: 100
          example: "Nicolás"
        apellido:
          type: string
          maxLength: 100
          example: "Astudillo"
        rut:
          type: string
          maxLength: 20
          description: "Formato chileno: 12345678-9"
          example: "12345678-9"
        cargo:
          type: string
          maxLength: 50
          example: "Desarrollador"
        salarioBase:
          type: number
          description: "Mínimo permitido: 400000"
          minimum: 400000
          maximum: 9999999999999.99
          example: 850000
        bonos:
          type: number
          description: "Opcional. No puede superar el 50% del salario base. Por defecto: 0"
          maximum: 9999999999999.99
          default: 0
          example: 100000
        descuentos:
          type: number
          description: "Opcional. No puede superar el salario base. Por defecto: 0"
          maximum: 9999999999999.99
          default: 0
          example: 50000

    EmpleadoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nombre:
          type: string
          example: "Nicolás"
        apellido:
          type: string
          example: "Astudillo"
        rut:
          type: string
          example: "12345678-9"
        cargo:
          type: string
          example: "Desarrollador"
        salarioBase:
          type: number
          example: 850000
        bonos:
          type: number
          example: 100000
        descuentos:
          type: number
          example: 50000

    MensajeResponse:
      type: object
      properties:
        mensaje:
          type: string
          example: "Registro de empleado guardado"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Validación de Negocio"
        mensaje:
          type: string
          example: "El sueldo base no puede ser inferior a 400.000"
