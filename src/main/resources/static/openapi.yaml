openapi: 3.0.3
info:
  title: API Empleados - Desafío Legacy
  description: API REST para gestión de empleados usando Servlets y JDBC con H2
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Servidor local

paths:
  /api/empleados:
    get:
      summary: Listar empleados
      operationId: listarEmpleados
      responses:
        '200':
          description: Lista de empleados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Empleado'
    post:
      summary: Crear empleado
      operationId: crearEmpleado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoInput'
      responses:
        '201':
          description: Empleado creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empleado'
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/empleados/{id}:
    delete:
      summary: Eliminar empleado
      operationId: eliminarEmpleado
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Empleado eliminado
        '404':
          description: Empleado no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Empleado:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string
        apellido:
          type: string
        rut:
          type: string
          example: "12345678-5"
        cargo:
          type: string
        salario_base:
          type: number
          format: double
          minimum: 400000
        bonos:
          type: number
          format: double
        descuentos:
          type: number
          format: double

    EmpleadoInput:
      type: object
      required:
        - nombre
        - apellido
        - rut
        - cargo
        - salario_base
      properties:
        nombre:
          type: string
        apellido:
          type: string
        rut:
          type: string
          example: "12345678-5"
        cargo:
          type: string
        salario_base:
          type: number
          format: double
          minimum: 400000
        bonos:
          type: number
          format: double
          default: 0
        descuentos:
          type: number
          format: double
          default: 0

    ErrorResponse:
      type: object
      properties:
        mensaje:
          type: string
        errores:
          type: array
          items:
            type: string
