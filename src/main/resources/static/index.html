<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empleados</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
    <h1>GESTIÓN DE EMPLEADOS</h1>
</header>

<h2>Agregar Empleado</h2>
<form id="formularioEmpleado">
    <div>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Ingrese el nombre" />
    </div>
    <div>
        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" placeholder="Ingrese el apellido" />
    </div>
    <div>
        <label for="rut">RUT</label>
        <input type="text" id="rut" placeholder="Ej: 12345678-9" />
    </div>
    <div>
        <label for="cargo">Cargo</label>
        <input type="text" id="cargo" placeholder="Ingrese el cargo" />
    </div>
    <div>
        <label for="salarioBase">Salario Base</label>
        <input type="number" id="salarioBase" placeholder="Ingrese el salario base" />
    </div>
    <div>
        <label for="bono">Bono</label>
        <input type="number" id="bono" placeholder="Ingrese el bono" />
    </div>
    <div>
        <label for="descuentos">Descuentos</label>
        <input type="number" id="descuentos" placeholder="Ingrese los descuentos" />
    </div>
    <button type="submit">AGREGAR EMPLEADO</button>
</form>

<div id="errores"></div>

<h2>Lista de Empleados</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>RUT</th>
        <th>Cargo</th>
        <th>Salario Base</th>
        <th>Bono</th>
        <th>Descuentos</th>
        <th>Acción</th>
    </tr>
    </thead>
    <tbody id="tablaEmpleados">
    </tbody>
</table>

<script src="/js/app.js"></script>
</body>
</html>
