<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empleados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Gestión de Empleados</h1>

<div class="card">
    <h2>Agregar Empleado</h2>
    <form id="formEmpleado" class="form-grid" novalidate>
        <div>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Ej: Juan" required>
            <div class="error"></div>
        </div>
        <div>
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" placeholder="Ej: Pérez" required>
            <div class="error"></div>
        </div>
        <div>
            <label for="rut">RUT/DNI</label>
            <input type="text" id="rut" placeholder="Ej: 12345678-5" required>
            <div class="error"></div>
        </div>
        <div>
            <label for="cargo">Cargo</label>
            <input type="text" id="cargo" placeholder="Ej: Desarrollador" required>
            <div class="error"></div>
        </div>
        <div>
            <label for="salarioBase">Salario Base ($)</label>
            <input type="text" id="salarioBase" placeholder="Mínimo 400000" min="400000" required>
            <div class="error"></div>
        </div>
        <div>
            <label for="bonos">Bonos ($)</label>
            <input type="text" id="bonos" placeholder="0" min="0">
            <div class="error"></div>
        </div>
        <div>
            <label for="descuentos">Descuentos ($)</label>
            <input type="text" id="descuentos" placeholder="0" min="0">
            <div class="error"></div>
        </div>
        <div class="error-container">
            <ul id="errores" class="error-list" style="display:none;"></ul>
        </div>
        <div class="btn-container">
            <button type="submit" class="btn btn-primary">Agregar Empleado</button>
        </div>
    </form>
</div>

<div class="card">
    <h2>Lista de Empleados</h2>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>RUT/DNI</th>
            <th>Cargo</th>
            <th class="salary">Salario Base</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tablaEmpleados">
        <tr><td colspan="9" class="empty-msg">Cargando...</td></tr>
        </tbody>
    </table>
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div style="background:white; padding:20px; margin:15% auto; width:300px; text-align:center;">
            <p id="mensaje"></p>
            <button onclick="confirmarEliminar()">Sí</button>
            <button onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
