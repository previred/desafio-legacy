<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Empleados</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
	<div class="container">
		<h1>Gestión de Empleados</h1>

		<div id="errorBox" class="error-box"></div>
		<div id="successBox" class="success-box"></div>

		<section class="card">
			<h2>Agregar empleado</h2>

			<form id="employeeForm">
				<div>
					<label for="name">Nombre</label> <input type="text" id="name">
				</div>
				<div>
					<label for="lastName">Apellido</label> <input type="text"
						id="lastName">
				</div>

				<div>
					<label for="documentNumber">RUT/DNI</label> <input type="text"
						id="documentNumber" placeholder="Ej: 12345678-9"> <small
						class="hint">Formato: 12345678-9</small>
				</div>

				<div>
					<label for="position">Cargo</label> <input type="text"
						id="position">
				</div>
				<div>
					<label for="baseSalary">Salario base</label> <input type="number"
						id="baseSalary">
				</div>
				<div>
					<label for="bonus">Bono</label> <input type="number" id="bonus">
				</div>
				<div>
					<label for="discounts">Descuentos</label> <input type="number"
						id="discounts">
				</div>
				<div class="form-actions">
					<button type="submit">Guardar</button>
					<button type="button" id="resetBtn">Limpiar</button>
				</div>
			</form>
		</section>

		<section class="card">
			<h2>Lista de empleados</h2>

			<div class="table-wrapper">
				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Nombre</th>
							<th>Apellido</th>
							<th>RUT</th>
							<th>Cargo</th>
							<th>Base</th>
							<th>Bono</th>
							<th>Descuentos</th>
							<th>Acción</th>
						</tr>
					</thead>
					<tbody id="employeeTableBody"></tbody>
				</table>
			</div>
		</section>
	</div>

	<script src="/js/app.js"></script>
</body>
</html>
