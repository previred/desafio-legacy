<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Empleados</title>
    <link rel="icon" href="data:,">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
    >
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
</head>
<body class="bg-light">

<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-11 col-xl-10">

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="h3 mb-1 fw-bold">Gestión de Empleados</h1>
                </div>

                <button type="button" class="btn btn-primary px-4"
                        data-bs-toggle="modal"
                        data-bs-target="#modalEmpleado">
                    <i class="bi bi-plus-circle me-2"></i>
                    Agregar empleado
                </button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h2 class="h5 mb-3">Listado de empleados</h2>
                </div>

                <div class="card-body pt-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Nombre</th>
                                <th scope="col">Apellido</th>
                                <th scope="col">RUT / DNI</th>
                                <th scope="col">Cargo</th>
                                <th scope="col" class="text-end">Salario</th>
                                <th scope="col" class="text-center">Acción</th>
                            </tr>
                            </thead>
                            <tbody id="tabla-empleados">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
<div class="modal fade" id="modalEmpleado" tabindex="-1" aria-labelledby="modalEmpleadoLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">

            <div class="modal-header bg-primary bg-opacity-75 text-white rounded-top-4">
                <h5 class="modal-title fw-semibold" id="modalEmpleadoLabel">
                    <i class="bi bi-person-plus me-2"></i>
                    Agregar empleado
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>

            <div class="modal-body px-4 py-4">
                <form id="form-empleado">

                    <div id="errores-formulario" class="alert alert-danger d-none" role="alert"></div>

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label" for="nombre">Nombre</label>
                            <input type="text" class="form-control form-control-lg" id="nombre" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="apellido">Apellido</label>
                            <input type="text" class="form-control form-control-lg" id="apellido" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="rut">RUT / DNI</label>
                            <input type="text" class="form-control form-control-lg" id="rut" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="cargo">Cargo</label>
                            <input type="text" class="form-control form-control-lg" id="cargo" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="salario">Salario</label>
                            <input type="number" class="form-control form-control-lg" id="salario" required>
                        </div>

                    </div>

                </form>
            </div>

            <div class="modal-footer border-0 px-4 pb-4">
                <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button type="submit" form="form-empleado" class="btn btn-primary px-5 fw-semibold">
                    Guardar
                </button>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="modalEliminar" tabindex="-1" aria-labelledby="modalEliminarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">

            <div class="modal-header bg-danger bg-opacity-75 text-white rounded-top-4">
                <h5 class="modal-title fw-semibold" id="modalEliminarLabel">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    Confirmar eliminación
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>

            <div class="modal-body text-center py-4 px-4">
                <p class="mb-0 fs-5">
                    ¿Estás seguro de eliminar este empleado?
                </p>
            </div>

            <div class="modal-footer border-0 justify-content-center pb-4">
                <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button type="button" id="btn-confirmar-eliminar" class="btn btn-danger px-4 fw-semibold">
                    Eliminar
                </button>
            </div>

        </div>
    </div>
</div>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"
></script>

<script src="js/validaciones.js"></script>
<script src="js/app.js"></script>
</body>
</html>
