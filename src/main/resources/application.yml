spring:
  datasource:
    url: jdbc:h2:mem:desafioDB;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  
  # Inicialización automática del schema
  sql:
    init:
      mode: always

  # Habilitar consola de H2 local
  h2:
    console:
      enabled: true
      path: /h2-console
      
server:
  port: 8080

springdoc:
  swagger-ui:
    url: /openapi.yml

logging:
  level:
    dev.unicoast.desafio: DEBUG
    org.springframework.web: INFO
