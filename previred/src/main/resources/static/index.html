<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestión de Empleados - Previred</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 30px;
            color: #333;
            background-color: #f4f7f6;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .form-card {
            background: #ffffff;
            padding: 20px;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        /* Caja de errores dinámica sugerida en el desafío */
        .error-box {
            color: #a94442;
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            padding: 15px;
            border-radius: 6px;
            display: none;
            margin-bottom: 20px;
        }

        .error-box ul {
            margin: 0;
            padding-left: 20px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border-bottom: 1px solid #eee;
            padding: 15px;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 600;
        }

        .btn-delete {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #cc0000;
        }

        .btn-save {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }

        .btn-save:hover {
            background: #27ae60;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #666;
        }

        /* Estilos del Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .modal-actions {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>📋 Registro de Colaboradores</h2>

        <div id="errorMessage" class="error-box"></div>
        <div class="form-card">
            <form id="empleadoForm">
                <div class="grid-inputs">
                    <div>
                        <label>Nombre</label>
                        <input type="text" id="nombre" placeholder="Ej: Juan">
                    </div>
                    <div>
                        <label>Apellido</label>
                        <input type="text" id="apellido" placeholder="Ej: Pérez">
                    </div>
                    <div>
                        <label>RUT / DNI</label>
                        <input type="text" id="rut" placeholder="12345678-9">
                    </div>
                    <div>
                        <label>Cargo</label>
                        <input type="text" id="cargo" placeholder="Analista">
                    </div>
                    <div>
                        <label>Salario Base ($)</label>
                        <input type="number" id="salario" placeholder="Mínimo 400000">
                    </div>
                    <div>
                        <label>Bono ($)</label>
                        <input type="number" id="bono" placeholder="Máx 50% del base" value="0">
                    </div>
                    <div style="grid-column: span 2;">
                        <label>Descuentos Totales ($)</label>
                        <input type="number" id="descuento" placeholder="No puede superar el base" value="0">
                    </div>
                </div>
                <button type="submit" class="btn-save">Finalizar Registro</button>
            </form>
        </div>


        <table id="tablaEmpleados">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre Completo</th>
                    <th>RUT</th>
                    <th>Cargo</th>
                    <th>Salario Base</th>
                    <th>Bono</th>
                    <th>Descuento</th>
                    <th>Salario Líquido</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script src="app.js"></script>

    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>¿Confirmar eliminación?</h3>
            <p>Esta acción no se puede deshacer.</p>
            <div class="modal-actions">
                <button id="btnCancel" class="btn-secondary">Cancelar</button>
                <button id="btnConfirmDelete" class="btn-danger">Eliminar</button>
            </div>
        </div>
    </div>
</body>

</html>
